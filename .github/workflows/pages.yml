name: Deploy GitHub Pages Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Remove routes that require a server or have no demo data
        run: |
          rm -rf web/src/app/api
          rm -rf "web/src/app/learn/[courseId]/recap"
          rm -rf "web/src/app/flashcards/[deckId]"
          rm -rf "web/src/app/quizzes/[quizId]"

      - name: Build demo
        run: npm run build:demo
        working-directory: web

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
