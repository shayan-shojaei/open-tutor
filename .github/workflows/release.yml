name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build & publish web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies (hoisted)
        # node-linker=hoisted gives an npm-style symlink-free node_modules, so the
        # standalone tarball contains plain files the CLI can extract on any platform.
        # pnpm 9 reads the setting from .npmrc, pnpm 10+ from pnpm-workspace.yaml.
        run: |
          echo "node-linker=hoisted" >> .npmrc
          printf '\nnodeLinker: hoisted\n' >> pnpm-workspace.yaml
          pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter ./packages/shared build

      - name: Build web app
        run: pnpm build
        working-directory: web

      - name: Package standalone output
        working-directory: web
        run: |
          # Monorepo standalone layout: .next/standalone/{web/server.js, node_modules/}.
          # The CLI (v1+) looks for server.js at web/server.js.
          cp -r .next/static .next/standalone/web/.next/static
          [ -d public ] && cp -r public .next/standalone/web/public || mkdir -p .next/standalone/web/public
          tar -czf ../web-standalone-${{ github.ref_name }}.tar.gz -C .next/standalone .

      - name: Generate checksum
        run: sha256sum web-standalone-${{ github.ref_name }}.tar.gz | awk '{print $1}' > web-standalone-${{ github.ref_name }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-standalone-${{ github.ref_name }}.tar.gz
            web-standalone-${{ github.ref_name }}.sha256

  build-cli:
    name: Build & publish CLI binaries
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Sync skills into CLI
        run: make sync-skills

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X github.com/shayan-shojaei/open-tutor/internal/config.Version=${{ github.ref_name }}" \
            -o ../tutor-${{ matrix.suffix }}${{ matrix.ext || '' }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tutor-${{ matrix.suffix }}${{ matrix.ext || '' }}
