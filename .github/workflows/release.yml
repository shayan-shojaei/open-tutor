name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build & publish web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Package standalone output
        run: |
          cp -r .next/static .next/standalone/.next/static
          [ -d public ] && cp -r public .next/standalone/public || mkdir -p .next/standalone/public
          tar -czf ../web-standalone-${{ github.ref_name }}.tar.gz -C .next/standalone .

      - name: Generate checksum
        run: sha256sum ../web-standalone-${{ github.ref_name }}.tar.gz | awk '{print $1}' > ../web-standalone-${{ github.ref_name }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            web-standalone-${{ github.ref_name }}.tar.gz
            web-standalone-${{ github.ref_name }}.sha256

  build-cli:
    name: Build & publish CLI binaries
    runs-on: ubuntu-latest
    needs: build-web
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: cli/go.sum

      - name: Sync skills into CLI
        run: make sync-skills

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X github.com/shayan-shojaei/open-tutor/internal/config.Version=${{ github.ref_name }}" \
            -o ../tutor-${{ matrix.suffix }}${{ matrix.ext || '' }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: tutor-${{ matrix.suffix }}${{ matrix.ext || '' }}
